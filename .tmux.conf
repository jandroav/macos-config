# Prefix
set -g prefix C-b

# General
set -g set-clipboard on
set -g mouse on
set -g status-position top
set -g default-terminal "tmux-256color"
set -g set-titles-string "#S:#I.#P"
set -g allow-rename off
set -g automatic-rename off
set -g base-index 1
set -g renumber-windows on 
setw -g pane-base-index 1
setw -g mode-keys vi 

# Key bindings
bind r source-file ~/.tmux.conf
bind-key x kill-pane
bind-key Q confirm-before -p "Kill tmux server? (y/n)" kill-server
bind-key m split-window -v
bind-key u split-window -h
bind-key Tab last-window
unbind l

#sesh integration
bind -N "last-session (via sesh)" j run-shell "sesh last"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'yahddyyp/tmux-simple-renamers'

# Plugin settings
set -g @floax-bind 'g'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color '#ffc799'
set -g @floax-text-color '#ffffff'
set -g @floax-change-path 'true'

set -g @tmux-simple-renamers-sesh-integration 'on'
set -g @tmux-simple-renamers-start-blank "on"

# Smart pane switching with awareness of Vim and Atuin
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf|atuin)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

bind C-l send-keys 'C-l'

# Catppuccin (must be set before TPM initializes plugins)
set -g @catppuccin_flavor 'mocha'

# Vesper palette overrides — remap catppuccin variables to Vesper colors
set -g @thm_bg "#101010"
set -g @thm_fg "#ffffff"
set -g @thm_mauve "#ffc799"
set -g @thm_sapphire "#99ffe4"
set -g @thm_blue "#99ffe4"
set -g @thm_text "#ffffff"
set -g @thm_subtext_0 "#a0a0a0"
set -g @thm_subtext_1 "#a0a0a0"
set -g @thm_surface_0 "#1c1c1c"
set -g @thm_surface_1 "#1c1c1c"
set -g @thm_surface_2 "#3f3f3f"
set -g @thm_overlay_0 "#3f3f3f"
set -g @thm_green "#99ffe4"
set -g @thm_red "#ff8080"
set -g @thm_pink "#ff8080"
set -g @thm_peach "#ffc799"
set -g @thm_yellow "#ffc799"
set -g @thm_lavender "#ffc799"
set -g @catppuccin_status_background "default"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_flags "none"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag, 󰁌,}"
set -g @catppuccin_window_current_number_color "#99ffe4"
set -g @catppuccin_session_text " #{s|.*/||:session_name}"
set -g @catppuccin_window_number_color "#{E:@thm_mauve}"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_directory_text " #{?#{==:#{pane_current_path},$HOME},~,#{b:pane_current_path}}"

# Status module settings for "pill" style
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

# Initialize TPM (must come before plugin run commands)
run '~/.tmux/plugins/tpm/tpm'

# Status bar
set -g status 2
set -g status-format[1] ""
set -g status-justify left
set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session} "
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_battery}"

run '~/.tmux/plugins/tmux/catppuccin.tmux'
run '~/.tmux/plugins/tmux-cpu/cpu.tmux'
run '~/.tmux/plugins/tmux-battery/battery.tmux'

set -g status-bg default
set -g status-style bg=default
