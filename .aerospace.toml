config-version = 2
after-startup-command = [
    'exec-and-forget /bin/bash -lc "~/.config/borders/bordersrc"',
    'exec-and-forget /opt/homebrew/bin/sketchybar',
    'exec-and-forget /bin/bash -lc "~/.config/sketchybar/plugins/space_windows.sh"'
]
start-at-login = true
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
accordion-padding = 200
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
on-focus-changed = [
    'exec-and-forget /bin/bash -c "sketchybar --trigger front_app_switched INFO=$(aerospace list-windows --focused --format %{app-name})"',
    'exec-and-forget /bin/bash -c "for sid in 1 2 3 4; do sketchybar --trigger aerospace_workspace_change NAME=space.$sid FOCUSED_WORKSPACE=$(aerospace list-workspaces --focused); done"',
    'exec-and-forget ~/.config/sketchybar/plugins/space_windows.sh'
]
automatically-unhide-macos-hidden-apps = false

persistent-workspaces = ["1", "2", "3", "4"]

[workspace-to-monitor-force-assignment]
    1 = 'secondary'
    2 = 'secondary'
    3 = 'built-in'
    4 = 'built-in'

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 9
    inner.vertical =   9
    outer.left =       9
    outer.bottom =     9
    outer.top =        [{ monitor.'built-in' = 14 }, 50]
    outer.right =      9

[mode.main.binding]
    shift-alt-p = 'layout tiles horizontal vertical'
    shift-alt-y = 'layout tiles vertical'
    shift-alt-r = 'layout tiles horizontal'
    shift-alt-q = 'layout floating'
    shift-alt-n = 'layout tiles'
    shift-alt-a = 'layout accordion'
    shift-alt-t = 'layout floating tiling'

    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    ctrl-alt-shift-cmd-h = 'focus left'
    ctrl-alt-shift-cmd-j = 'focus down'
    ctrl-alt-shift-cmd-k = 'focus up'
    ctrl-alt-shift-cmd-l = 'focus right'

    ctrl-alt-h = 'swap left'
    ctrl-alt-j = 'swap down'
    ctrl-alt-k = 'swap up'
    ctrl-alt-l = 'swap right'

    alt-shift-h = 'resize width -50'
    alt-shift-j = 'resize height +50'
    alt-shift-k = 'resize height -50'
    alt-shift-l = 'resize width +50'

    ctrl-alt-shift-cmd-1 = ['workspace 1', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=1']
    ctrl-alt-shift-cmd-2 = ['workspace 2', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=2']
    ctrl-alt-shift-cmd-3 = ['workspace 3', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=3']
    ctrl-alt-shift-cmd-4 = ['workspace 4', 'exec-and-forget sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=4']

    alt-shift-1 = ['move-node-to-workspace 1', 'exec-and-forget ~/.config/sketchybar/plugins/space_windows.sh']
    alt-shift-2 = ['move-node-to-workspace 2', 'exec-and-forget ~/.config/sketchybar/plugins/space_windows.sh']
    alt-shift-3 = ['move-node-to-workspace 3', 'exec-and-forget ~/.config/sketchybar/plugins/space_windows.sh']
    alt-shift-4 = ['move-node-to-workspace 4', 'exec-and-forget ~/.config/sketchybar/plugins/space_windows.sh']


    shift-alt-enter = 'flatten-workspace-tree'
    alt-tab = 'workspace-back-and-forth'
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'
    alt-shift-semicolon = 'mode service'

    ctrl-alt-enter = 'fullscreen'
    shift-alt-f = 'macos-native-fullscreen'

    # Hyper (Caps Lock) shortcuts for common actions
    ctrl-alt-shift-cmd-tab = 'workspace-back-and-forth'
    ctrl-alt-shift-cmd-enter = 'fullscreen'
    ctrl-alt-shift-cmd-f = 'macos-native-fullscreen'
    ctrl-alt-shift-cmd-t = 'layout floating tiling'
    ctrl-alt-shift-cmd-e = 'flatten-workspace-tree'
    ctrl-alt-shift-cmd-semicolon = 'mode service'

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main']
    f = ['layout floating tiling', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']
    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.calculator'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.shottr.Shottr'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.raycast.macos'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'WhatsApp'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'us.zoom.xos'
run = ['move-node-to-workspace 4', 'layout tiles']

[[on-window-detected]]
if.app-name-regex-substring = '(?i)zoom'
run = ['move-node-to-workspace 4', 'layout tiles']

[[on-window-detected]]
if.app-id = 'app.zen-browser.zen'
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = ['move-node-to-workspace 3']

[[on-window-detected]]
if.app-id = 'com.apple.mail'
run = ['move-node-to-workspace 3']

# Floating utilities — popups/small windows that tile awkwardly
[[on-window-detected]]
if.app-id = 'net.freemacsoft.AppCleaner'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.bitwarden.desktop'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.docker.docker'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.loom.desktop'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.onmyway133.PastePal'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.SFSymbols'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'leits.MeetingBar'
run = 'layout floating'

# Pin to workspace 2 (scratch on external)
[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = ['move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'dev.zed.Zed'
run = ['move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'com.anthropic.claudefordesktop'
run = ['move-node-to-workspace 2']
